workflows:
  android-debug-build:
    name: NowInAndroid Debug APK
    max_build_duration: 90
    environment:
      java: 17
    scripts:
      - name: Make gradlew executable
        script: |
          chmod +x gradlew
      - name: Build Demo Debug APK
        script: |
          ./gradlew :app:assembleDemoDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.configuration-cache=false \
            -Dorg.gradle.caching=false \
            -Pandroid.injected.testOnly=false
    artifacts:
      - app/build/outputs/apk/demo/debug/*.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
